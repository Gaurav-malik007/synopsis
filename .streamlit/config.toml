[theme]
primaryColor = "#0D9488"
backgroundColor = "#0F172A"
secondaryBackgroundColor = "#1E293B"
textColor = "#E2E8F0"
font = "sans serif"

[server]
maxUploadSize = 50
headless = true
port = 8501

[client]
showErrorDetails = true
toolbarMode = "viewer"

[logger]
level = "info"

[browser]
gatherUsageStats = false

# Mobile optimization
[ui]
scrollBehavior = "smooth"
